<!DOCTYPE html>
<html>
<head>

<title>Emergency Response Planning</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px;
text-align:center;
}

.container{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
}

.card h3{
color:#38bdf8;
}

button{
margin-top:30px;
padding:10px 20px;
background:#38bdf8;
border:none;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<h2>Emergency Response Planning</h2>
</header>

<div class="container">

<div class="grid">

<div class="card">
<h3>AI Recommended Actions</h3>

<ul>
<li>Activate pump station – Ward 21</li>
<li>Deploy drainage cleaning team</li>
<li>Alert traffic control</li>
<li>Send citizen flood warnings</li>
</ul>

</div>

<div class="card">
<h3>Evacuation Routes</h3>

<ul>
<li>Ring Road → AIIMS Safe Zone</li>
<li>NH-48 → Gurgaon Shelter</li>
<li>Outer Ring Road → Rohini Shelter</li>
</ul>

</div>

</div>

<center>
<button onclick="window.location.href='index.html'">Back to Dashboard</button>
</center>

</div>

</body>
</html>
